# Même logique qu'en dev : une seule base (schoolmatrix-db-dev, port 5433).
# L'API charge le .env du backend (env_file) pour avoir les mêmes identifiants qu'en dev.
# DB_HOST et DB_PORT sont forcés pour que le conteneur joigne la base sur l'hôte (5433).
#
# Build + lancer :  docker compose up -d --build   ou   .\run.ps1
# Optionnel : volume pour persister les fichiers (profiles, uploads, backups)
# volumes:
#   schoolmatrix-storage:

services:
  api:
    image: schoolmatrix-api
    build:
      context: ./parallele-schoolmatrix-backend
      args:
        - CACHEBUST=${CACHEBUST:-0}
    container_name: schoolmatrix-api
    restart: unless-stopped
    env_file:
      - ./parallele-schoolmatrix-backend/.env.dev
    environment:
      NODE_ENV: production
      DB_HOST: host.docker.internal
      DB_PORT: "5433"
      STORAGE_ROOT: /app/storage
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Décommenter pour persister les fichiers :
    # volumes:
    #   - schoolmatrix-storage:/app/storage

  web:
    image: schoolmatrix-web
    build:
      context: ./parallele-schoolmatrix-frontend
      args:
        - CACHEBUST=${CACHEBUST:-0}
        - NEXT_PUBLIC_API_URL=http://127.0.0.1:3000
    container_name: schoolmatrix-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
      API_INTERNAL_URL: http://schoolmatrix-api:3000
    depends_on:
      - api
    ports:
      - "3001:3001"
